<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>होलिका दहन और होली की शुभकामनाएँ</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; font-family: 'Arial', sans-serif;
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: #fff; text-align: center; min-height: 100vh;
        }
        .main-container {
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            padding: 15px;
        }
        .card {
            background: rgba(0, 0, 0, 0.7); padding: 25px;
            border-radius: 20px; border: 3px solid #ffcc00;
            width: 85%; max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 20px;
        }
        h1 { font-size: 1.8rem; text-shadow: 2px 2px #ff0000; margin-bottom: 10px; }
        .greeting-p { font-size: 1.1rem; margin: 5px 0; }
        .wishes-h1 { color: #ffcc00; font-size: 1.5rem; margin-top: 15px; }
        .special-wish { color: #ffcc00; font-size: 1.3rem; margin: 10px 0; font-weight: bold; }
        
        input { 
            padding: 15px; width: 80%; border-radius: 30px; 
            border: none; margin: 20px 0; font-size: 1.1rem;
            text-align: center; outline: none;
        }
        .btn-magic { 
            background: #ffcc00; color: #000; padding: 12px 35px; 
            border-radius: 50px; font-weight: bold; border: none; cursor: pointer;
            font-size: 1.2rem;
        }
        .btn-whatsapp { 
            background: #25D366; color: white; padding: 15px 30px; 
            border-radius: 50px; text-decoration: none; display: inline-block; 
            margin-top: 20px; font-weight: bold; font-size: 1.2rem;
        }
        
        #output-screen { display: none; }

        /* विज्ञापन के लिए नीचे का कंटेनर */
        .ad-container-bottom {
            width: 100%; max-width: 320px;
            min-height: 100px; margin-top: auto; /* यह इसे नीचे रखेगा */
            padding-top: 30px; padding-bottom: 15px;
            background: rgba(0,0,0,0.1); border-radius: 10px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="main-container">

    <div class="card">
        <div id="input-screen">
            <h1>🔥 होलिका दहन और <br> 🎨 होली की बधाई</h1>
            <input type="text" id="nameBox" placeholder="यहाँ अपना नाम लिखें...">
            <br>
            <button class="btn-magic" onclick="showMagic()">जादू देखें ✨</button>
        </div>

        <div id="output-screen">
            <h2 id="finalName" style="color: #00ffcc; font-size: 2.5rem; margin: 0;"></h2>
            <p class="greeting-p">की तरफ से आपको</p>
            <h1 class="wishes-h1">सुखद होलिका दहन और <br> रंगीन होली की बधाई!</h1>
            
            <p class="special-wish">होलिका दहन की अग्नि में आपकी सारी परेशानियाँ जल जाएँ और होली के रंग आपके जीवन को खुशियों से भर दें!</p>
            
            <a id="shareBtn" class="btn-whatsapp" href="#">WhatsApp पर भेजें ➔</a>
        </div>
    </div>

    <div class="ad-container-bottom">
        <script async="async" data-cfasync="false" src="https://pl28817016.effectivegatecpm.com/dc1a62b76cf4061cfc9a39be9458547e/invoke.js"></script>
        <div id="container-dc1a62b76cf4061cfc9a39be9458547e"></div>
    </div>

</div>

<script>
    function showMagic() {
        var name = document.getElementById("nameBox").value;
        if(name.trim() === "") { alert("कृपया अपना नाम लिखें!"); return; }
        
        // स्क्रीन बदलें
        document.getElementById("input-screen").style.display = "none";
        document.getElementById("output-screen").style.display = "block";
        document.getElementById("finalName").innerText = "✨ " + name + " ✨";

        // धमाका इफेक्ट (Confetti)
        var duration = 5 * 1000;
        var end = Date.now() + duration;

        (function frame() {
          confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff0000', '#00ff00', '#ffff00'] });
          confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#0000ff', '#ff00ff', '#00ffff'] });
          if (Date.now() < end) { requestAnimationFrame(frame); }
        }());

        // WhatsApp शेयर लिंक तैयार करें
        var msg = window.encodeURIComponent("*"+name+"* ने आपके लिए एक बहुत प्यारा होली सरप्राइज भेजा है! 🎨🔥 इसे यहाँ क्लिक करके देखें 👇\n" + window.location.href);
        document.getElementById("shareBtn").href = "https://wa.me/?text=" + msg;
    }
</script>

</body>
</html>
