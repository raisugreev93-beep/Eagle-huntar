<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Eagle Pro Hunter - Sugreev Rai</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001a33; font-family: sans-serif; }
        canvas { display: block; touch-action: none; }
        #ui { position: absolute; top: 15px; left: 15px; color: #fff; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 4px #000; z-index: 10; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.85); padding: 40px; border-radius: 20px; color: white; z-index: 20; width: 85%; border: 2px solid gold; }
        button { background: linear-gradient(to bottom, #ffcc00, #ff9900); border: none; padding: 18px 50px; color: black; font-size: 22px; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .info { font-size: 14px; margin-top: 15px; color: #ccc; }
        .wa-btn { background: #25D366; color: white; text-decoration: none; padding: 12px 25px; border-radius: 50px; display: inline-block; margin-top: 10px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span> | Energy: <span id="energy">100</span>%</div>
    
    <div id="menu">
        <h1 style="color:gold; margin:0;">EAGLE HUNTER</h1>
        <p id="msg">Professional Textile Edition</p>
        <button id="startBtn">START MISSION</button>
        <br><br>
        <a href="https://api.whatsapp.com/send?text=Check out my Eagle Game: https://raisugreev93-beep.github.io/Eagle-huntar/" class="wa-btn">SHARE ON WHATSAPP</a>
        <p class="info">© 2026 Sugreev Rai - Surat Division</p>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0, energy = 100, gameActive = false, bgX = 0;

    // --- इमेजेस ---
    const eagleImg = new Image();
    eagleImg.src = "https://cdn-icons-png.flaticon.com/512/2619/2619251.png"; // प्रोफेशनल बाज

    const bgImg = new Image();
    bgImg.src = "https://img.freepik.com/free-vector/nature-scene-with-river-hills_1308-31038.jpg"; // पहाड़ और झरने

    // --- बांसुरी का संगीत (Flute Music) ---
    const bgMusic = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3");
    bgMusic.loop = true;
    bgMusic.volume = 0.4;

    const eagle = { x: 70, y: canvas.height/2, w: 65, h: 50, dy: 0, gravity: 0.35, jump: -7.0 };
    let preyList = [];

    // आपका Adsterra विज्ञापन लिंक
    const MY_ADS_LINK = "https://www.profitablecpmratenetwork.com/u1zch7tenj?key=5f2ad5ab1ef2ac69db402b567c1f06f7"; 

    document.getElementById('startBtn').addEventListener('click', () => {
        bgMusic.play().catch(e => console.log("Music wait for touch"));
        startGame();
    });

    function startGame() {
        score = 0; energy = 100; eagle.y = canvas.height/2; eagle.dy = 0;
        preyList = []; gameActive = true;
        document.getElementById("menu").style.display = "none";
        document.getElementById("score").innerText = "0";
        update();
    }

    function update() {
        if (!gameActive) return;

        bgX -= 2.0; // स्पीड थोड़ी कम कर दी गई है (Smooth)
        if (bgX <= -canvas.width) bgX = 0;

        eagle.dy += eagle.gravity;
        eagle.y += eagle.dy;

        // जमीन या आसमान से टकराना
        if (eagle.y + eagle.h > canvas.height || eagle.y < 0) return gameOver();

        // शिकार का लॉजिक
        preyList.forEach((p, i) => {
            p.x -= 4.0;
            if (eagle.x < p.x + p.w && eagle.x + eagle.w > p.x &&
                eagle.y < p.y + p.h && eagle.y + eagle.h > p.y) {
                preyList.splice(i, 1);
                score += 20;
                energy = Math.min(100, energy + 12);
                document.getElementById("score").innerText = score;
            }
        });

        energy -= 0.08; // एनर्जी खत्म होने की स्पीड कम की
        document.getElementById("energy").innerText = Math.floor(energy);
        if (energy <= 0) return gameOver();

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // बैकग्राउंड
        ctx.drawImage(bgImg, bgX, 0, canvas.width, canvas.height);
        ctx.drawImage(bgImg, bgX + canvas.width, 0, canvas.width, canvas.height);

        // शिकार (Golden Prey)
        ctx.fillStyle = "gold";
        preyList.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 12, 0, Math.PI*2);
            ctx.fill();
            ctx.strokeStyle = "white"; ctx.stroke();
        });

        // बाज
        ctx.save();
        ctx.translate(eagle.x + eagle.w/2, eagle.y + eagle.h/2);
        ctx.rotate(eagle.dy * 0.04);
        ctx.drawImage(eagleImg, -eagle.w/2, -eagle.h/2, eagle.w, eagle.h);
        ctx.restore();
    }

    function gameOver() {
        gameActive = false;
        bgMusic.pause();
        document.getElementById("menu").style.display = "block";
        document.getElementById("msg").innerText = "MISSION FAILED! Score: " + score;
        
        // विज्ञापन अब सिर्फ गेम खत्म होने पर खुलेगा
        if(MY_ADS_LINK !== "") window.open(MY_ADS_LINK, '_blank');
    }

    // मोबाइल टच कंट्रोल
    window.addEventListener("touchstart", (e) => {
        if(gameActive) { e.preventDefault(); eagle.dy = eagle.jump; }
    }, {passive: false});

    setInterval(() => { 
        if(gameActive) preyList.push({x: canvas.width, y: Math.random()*(canvas.height-100)+50, w: 30, h: 30}); 
    }, 1800);
</script>
</body>
</html>
