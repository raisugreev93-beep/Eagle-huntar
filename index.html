<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Eagle Hunter Pro - Sugreev Rai</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001a33; font-family: sans-serif; }
        canvas { display: block; touch-action: none; }
        #ui { position: absolute; top: 15px; left: 15px; color: gold; font-size: 20px; font-weight: bold; text-shadow: 2px 2px 4px #000; z-index: 10; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.9); padding: 40px; border-radius: 20px; color: white; z-index: 20; width: 85%; border: 2px solid gold; }
        button { background: linear-gradient(to bottom, #ffcc00, #ff9900); border: none; padding: 18px 50px; color: black; font-size: 22px; border-radius: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span> | Energy: <span id="energy">100</span>%</div>
    <div id="menu">
        <h1 style="color:gold; margin:0;">EAGLE HUNTER</h1>
        <p>Real Eagle Experience</p>
        <button id="startBtn">START MISSION</button>
        <p style="font-size:12px; margin-top:10px;">© 2026 Sugreev Rai</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0, energy = 100, gameActive = false, bgX = 0;

    // --- धनिया-मिर्चा हटाने के लिए 'FORCE UPDATE' लिंक ---
    const eagleImg = new Image();
    eagleImg.src = "https://cdn-icons-png.flaticon.com/512/3222/3222792.png?v=sugreev_pro_v1"; 

    const bgImg = new Image();
    bgImg.src = "https://img.freepik.com/free-vector/mountain-landscape-with-river-sun_23-2148181605.jpg?v=sugreev_pro_v1";

    const bgMusic = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-17.mp3");
    bgMusic.loop = true;
    bgMusic.volume = 0.5;

    const eagle = { x: 70, y: canvas.height/2, w: 70, h: 50, dy: 0, gravity: 0.38, jump: -7.5 };
    let preyList = [];

    // Adsterra Link
    const MY_ADS_LINK = "https://www.profitablecpmratenetwork.com/u1zch7tenj?key=5f2ad5ab1ef2ac69db402b567c1f06f7";

    document.getElementById('startBtn').addEventListener('click', () => {
        bgMusic.play().catch(e => {}); 
        startGame();
    });

    function startGame() {
        score = 0; energy = 100; eagle.y = canvas.height/2; eagle.dy = 0;
        preyList = []; gameActive = true;
        document.getElementById("menu").style.display = "none";
        update();
    }

    function update() {
        if (!gameActive) return;
        bgX -= 3;
        if (bgX <= -canvas.width) bgX = 0;
        eagle.dy += eagle.gravity;
        eagle.y += eagle.dy;
        if (eagle.y + eagle.h > canvas.height || eagle.y < 0) return gameOver();
        
        preyList.forEach((p, i) => {
            p.x -= 5;
            if (eagle.x < p.x + p.w && eagle.x + eagle.w > p.x &&
                eagle.y < p.y + p.h && eagle.y + eagle.h > p.y) {
                preyList.splice(i, 1);
                score += 20;
                energy = Math.min(100, energy + 15);
                document.getElementById("score").innerText = score;
            }
        });

        energy -= 0.12;
        document.getElementById("energy").innerText = Math.floor(energy);
        if (energy <= 0) return gameOver();

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(bgImg, bgX, 0, canvas.width, canvas.height);
        ctx.drawImage(bgImg, bgX + canvas.width, 0, canvas.width, canvas.height);
        ctx.fillStyle = "gold";
        preyList.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, 10, 0, Math.PI*2); ctx.fill();
        });
        ctx.drawImage(eagleImg, eagle.x, eagle.y, eagle.w, eagle.h);
    }

    function gameOver() {
        gameActive = false;
        bgMusic.pause();
        // विज्ञापन अब यहाँ खुलेगा
        window.open(MY_ADS_LINK, '_blank');
        document.getElementById("menu").style.display = "block";
    }

    window.addEventListener("touchstart", (e) => {
        if(gameActive) { e.preventDefault(); eagle.dy = eagle.jump; }
    }, {passive: false});

    setInterval(() => { if(gameActive) preyList.push({x: canvas.width, y: Math.random()*(canvas.height-100)+50, w: 20, h: 20}); }, 1500);
</script>
</body>
</html>
